  <body>
    <div id="root"></div>
    <script src="./main-app-history-bridge.js"></script>
    <script>
    (function VeoBridge() {
      if (window.__MAIN_APP_HISTORY_BRIDGE__) return;
      'use strict';
      const MAIN_APP = 'https://www.qycm.top';
      const LS_TOKEN = '__veo_token';
      const LS_USER  = '__veo_user';

      /* ─── SSO Authentication ─── */
      async function handleSsoTicket() {
        const params = new URLSearchParams(location.search);
        const ticket = params.get('ticket');
        const mainApp = params.get('mainApp') || MAIN_APP;
        if (!ticket) return;
        try {
          const res = await fetch(mainApp + '/api/video-sso/exchange', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticket }),
          });
          if (!res.ok) throw new Error('SSO exchange failed');
          const json = await res.json();
          const payload = json.data || json;
          if (payload.token) localStorage.setItem(LS_TOKEN, payload.token);
          if (payload.user) localStorage.setItem(LS_USER, JSON.stringify(payload.user));
          // Clean URL
          const clean = location.pathname;
          history.replaceState(null, '', clean);
        } catch (e) { console.warn('[VeoBridge] SSO:', e); }
      }

      function getToken() { return localStorage.getItem(LS_TOKEN); }
      function getUser() {
        try { return JSON.parse(localStorage.getItem(LS_USER) || 'null'); } catch { return null; }
      }

      /* ─── API helpers ─── */
      async function apiGet(path) {
        const token = getToken();
        const res = await fetch(MAIN_APP + path, {
          headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        });
        if (!res.ok) throw new Error('API GET ' + res.status);
        return res.json();
      }
      async function apiPost(path, body) {
        const token = getToken();
        const res = await fetch(MAIN_APP + path, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
          },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('API POST ' + res.status);
        return res.json();
      }
      async function apiDelete(path) {
        const token = getToken();
        const res = await fetch(MAIN_APP + path, {
          method: 'DELETE',
          headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        });
        if (!res.ok) throw new Error('API DELETE ' + res.status);
        return res.json();
      }
      async function apiPatch(path, body) {
        const token = getToken();
        const res = await fetch(MAIN_APP + path, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
          },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('API PATCH ' + res.status);
        return res.json();
      }

      /* ─── Styles ─── */
      const style = document.createElement('style');
      style.textContent = `

        .vb-notice svg { vertical-align: -2px; margin-right: 4px; }
        .vb-drawer-body { flex: 1; overflow-y: auto; padding: 8px 0; }
        .vb-empty {
          text-align: center; padding: 40px 20px; color: var(--text-placeholder, #b5ad9e);
        }
        .vb-empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
        .vb-empty-text { font-size: 13px; }
        .vb-loading { text-align: center; padding: 32px; color: var(--text-tertiary, #8a8279); font-size: 13px; }
        .vb-item {
          padding: 12px 20px; cursor: pointer;
          border-bottom: 1px solid var(--border-light, #eae5dc);
          transition: background 150ms ease; position: relative;
        }
        .vb-item:hover { background: var(--bg-secondary, #f3f0eb); }
        .vb-item-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .vb-status {
          font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
          padding: 1px 6px; border-radius: 4px; text-transform: uppercase;
        }
        .vb-status-completed { background: #dcfce7; color: #166534; }
        .vb-status-processing, .vb-status-queued { background: #dbeafe; color: #1e40af; }
        .vb-status-failed { background: #fce4ec; color: #b71c1c; }
        .vb-item-time { font-size: 11px; color: var(--text-placeholder, #b5ad9e); }
        .vb-item-engine { font-size: 10px; color: var(--text-tertiary, #8a8279); font-weight: 500; }
        .vb-item-prompt {
          font-size: 12px; color: var(--text-secondary, #5c5549);
          line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2;
          -webkit-box-orient: vertical; overflow: hidden; margin-top: 4px;
        }
        .vb-item-actions {
          display: flex; gap: 4px; position: absolute; top: 10px; right: 12px;
          opacity: 0; transition: opacity 150ms ease;
        }
        .vb-item:hover .vb-item-actions { opacity: 1; }
        .vb-action-btn {
          width: 26px; height: 26px; border: 1px solid var(--border-light, #eae5dc);
          border-radius: 6px; background: var(--bg-card, #fff); cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          color: var(--text-tertiary, #8a8279); transition: all 150ms ease;
        }
        .vb-action-btn:hover { border-color: var(--border-medium, #d9d2c7); color: var(--text-primary, #1a1714); }
        .vb-action-btn.vb-fav-active { color: #f59e0b; border-color: #fde68a; background: #fffbeb; }
        .vb-action-btn.vb-del:hover { color: var(--error, #c47060); border-color: #fca5a5; background: #fef2f2; }

        .vb-refresh-btn:hover { border-color: var(--accent, #c4a882); color: var(--accent-dark, #9a7d5a); }
      `;
      document.head.appendChild(style);

      /* ─── Build Sidebar DOM ─── */
      const overlay = document.createElement('div');
      overlay.className = 'vb-overlay';
      document.body.appendChild(overlay);

      const drawer = document.createElement('div');
      drawer.className = 'vb-drawer';
      drawer.innerHTML = `
        <div class="vb-drawer-head">
          <div class="vb-drawer-head-top">
            <span class="vb-drawer-title">历史记录</span>
            <button class="vb-close-btn" id="vb-close">

      document.body.appendChild(drawer);

      // SVG icon helpers
      const starSvg = (filled) => filled
        ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
        : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
      const trashSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

      let favorites = new Set();
      try { favorites = new Set(JSON.parse(localStorage.getItem('__veo_favorites') || '[]')); } catch {}
      function saveFavorites() { localStorage.setItem('__veo_favorites', JSON.stringify([...favorites])); }

      function openDrawer() { overlay.classList.add('open'); drawer.classList.add('open'); loadHistory(); }
      function closeDrawer() { overlay.classList.remove('open'); drawer.classList.remove('open'); }
      overlay.addEventListener('click', closeDrawer);
      drawer.querySelector('#vb-close').addEventListener('click', closeDrawer);
      drawer.querySelector('#vb-refresh').addEventListener('click', loadHistory);

      /* ─── User Info ─── */
      function renderUserInfo() {
        const area = drawer.querySelector('#vb-user-area');
        const user = getUser();
        if (user) {
          const initial = (user.nickname || user.account || '?')[0].toUpperCase();
          area.innerHTML = `
            <div class="vb-user-info">
              <div class="vb-user-avatar">${initial}</div>
              <div>
                <div class="vb-user-name">${user.nickname || user.account}</div>
                <div class="vb-user-account">${user.account || ''}</div>
              </div>
            </div>
          `;
        } else {
          area.innerHTML = `<div class="vb-no-login">未登录 · <a id="vb-login-link">前往主站登录</a></div>`;
          const link = area.querySelector('#vb-login-link');
          if (link) link.addEventListener('click', () => { window.open(MAIN_APP + '/login', '_blank'); });
        }
      }

      /* ─── History List ─── */
      let expandedId = null;
      async function loadHistory() {
        const list = drawer.querySelector('#vb-list');
        const token = getToken();
        if (!token) {
          list.innerHTML = '<div class="vb-empty"><div class="vb-empty-icon">🔒</div><div class="vb-empty-text">登录后可查看历史记录</div></div>';
          return;
        }
        list.innerHTML = '<div class="vb-loading">加载中…</div>';
        try {
          const items = await apiGet('/api/video-bot/tasks?limit=50');
          if (!items || items.length === 0) {
            list.innerHTML = '<div class="vb-empty"><div class="vb-empty-icon">📭</div><div class="vb-empty-text">暂无历史记录</div></div>';
            return;
          }
          // Sort: favorites first, then by date
          const sorted = [...items].sort((a, b) => {
            const fa = favorites.has(a.id) ? 1 : 0;
            const fb = favorites.has(b.id) ? 1 : 0;
            if (fa !== fb) return fb - fa;
            return new Date(b.createdAt) - new Date(a.createdAt);
          });
          list.innerHTML = '';
          sorted.forEach(item => {
            const el = document.createElement('div');
            el.className = 'vb-item';
            const statusCls = 'vb-status-' + (item.status || 'queued');
            const statusMap = { completed: '完成', processing: '处理中', queued: '排队中', failed: '失败' };
            const statusLabel = statusMap[item.status] || item.status;
            const time = new Date(item.createdAt).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            const engineLabel = [item.engine, item.mode].filter(Boolean).join(' · ');
            const isFav = favorites.has(item.id);
            el.innerHTML = `
              <div class="vb-item-top">
                <span class="vb-status ${statusCls}">${statusLabel}</span>
                <span class="vb-item-time">${time}</span>
                <span class="vb-item-engine">${engineLabel}</span>
              </div>
              ${item.prompt ? '<div class="vb-item-prompt">' + escapeHtml(item.prompt) + '</div>' : ''}
              <div class="vb-item-actions">
                <button class="vb-action-btn vb-fav ${isFav ? 'vb-fav-active' : ''}" title="收藏">${starSvg(isFav)}</button>
                <button class="vb-action-btn vb-del" title="删除">${trashSvg}</button>
              </div>
              ${expandedId === item.id && item.videoUrl ? '<div class="vb-video-preview"></div>' : ''}
            `;
            // Toggle preview on click
            el.addEventListener('click', (e) => {
              if (e.target.closest('.vb-action-btn')) return;
              if (item.videoUrl) {
                expandedId = expandedId === item.id ? null : item.id;
                loadHistory();
              }
            });
            // Favorite toggle
            el.querySelector('.vb-fav').addEventListener('click', (e) => {
              e.stopPropagation();
              if (favorites.has(item.id)) favorites.delete(item.id);
              else favorites.add(item.id);
              saveFavorites();
              loadHistory();
            });
            // Delete
            el.querySelector('.vb-del').addEventListener('click', async (e) => {
              e.stopPropagation();
              if (!confirm('确认删除这条记录吗？')) return;
              try {
                await apiDelete('/api/video-bot/tasks/' + item.id);
                favorites.delete(item.id); saveFavorites();
                loadHistory();
              } catch (err) { alert('删除失败: ' + err.message); }
            });
            // Insert video preview if expanded
            if (expandedId === item.id && item.videoUrl) {
              setTimeout(() => {
                const pv = el.querySelector('.vb-video-preview');
                if (!pv) return;
                const isImage = /\.(png|jpg|jpeg|webp|gif)(\?|$)/i.test(item.videoUrl) || item.videoUrl.startsWith('data:image');
                if (isImage) pv.innerHTML = '<img src="' + escapeHtml(item.videoUrl) + '" alt="Preview">';
                else {
                  const vid = document.createElement('video');
                  vid.src = item.videoUrl; vid.controls = true; vid.autoplay = true; vid.loop = true;
                  pv.appendChild(vid);
                }
              }, 0);
            }
            list.appendChild(el);
          });
        } catch (err) {
          list.innerHTML = '<div class="vb-empty"><div class="vb-empty-icon">⚠️</div><div class="vb-empty-text">加载失败: ' + escapeHtml(err.message) + '</div></div>';
        }
      }

      function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      /* ─── Inject Hamburger Button ─── */
      function injectHamburger() {
        const headerLeft = document.querySelector('.header-left');
        if (!headerLeft || headerLeft.querySelector('.vb-hamburger')) return;
        const btn = document.createElement('button');
        btn.className = 'vb-hamburger';
        btn.title = '历史记录';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
        btn.addEventListener('click', openDrawer);
        headerLeft.insertBefore(btn, headerLeft.firstChild);
      }

      /* ─── Video Generation Sync ─── */
      let lastSyncedUrl = null;
      function watchForVideoGeneration() {
        const token = getToken();
        if (!token) return;
        const observer = new MutationObserver(() => {
          const previewFrame = document.querySelector('.preview-frame');
          if (!previewFrame) return;
          const video = previewFrame.querySelector('video');
          const img = previewFrame.querySelector('img.preview-image');
          const mediaEl = video || img;
          if (!mediaEl) return;
          const url = mediaEl.src;
          if (!url || url === lastSyncedUrl) return;
          if (url.startsWith('data:') && url.length < 100) return;
          lastSyncedUrl = url;
          // Gather context from UI
          const promptEl = document.querySelector('.prompt-ta');
          const prompt = promptEl ? promptEl.value : '';
          const activeTab = document.querySelector('.provider-tab.active .tab-name');
          const engine = activeTab ? activeTab.textContent : 'unknown';
          const activeMode = document.querySelector('.mode-tab.active span');
          const modeText = activeMode ? activeMode.textContent : '';
          const modeMap = { '文生视频': 'text2video', '文生图': 'text2image', '图生视频': 'image2video', '图生图': 'image2image' };
          const mode = modeMap[modeText] || 'text2video';
          const isImage = img && !video;
          apiPost('/api/video-bot/tasks', {
            engine: engine.toLowerCase(),
            mode: mode,
            prompt: prompt,
            videoUrl: url,
            status: 'completed',
          }).then(() => console.log('[VeoBridge] Synced generation'))
            .catch(e => console.warn('[VeoBridge] Sync failed:', e));
        });
        const target = document.querySelector('#root');
        if (target) observer.observe(target, { childList: true, subtree: true });
      }

      /* ─── Init ─── */
      async function init() {
        await handleSsoTicket();
        renderUserInfo();
        // Wait for React to render
        const waitForHeader = setInterval(() => {
          if (document.querySelector('.header-left')) {
            clearInterval(waitForHeader);
            injectHamburger();
          }
        }, 200);
        setTimeout(() => clearInterval(waitForHeader), 10000);
        watchForVideoGeneration();
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
    </script>
  </body>
</html>
