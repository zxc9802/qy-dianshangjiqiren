<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视频工作台入口</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 32%),
        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: #0f172a;
    }

    .card {
      width: min(100%, 760px);
      padding: 36px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 28px 70px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 42px);
      line-height: 1.1;
    }

    p {
      margin: 16px 0 0;
      color: #475569;
      line-height: 1.75;
      font-size: 15px;
    }

    .actions {
      margin-top: 28px;
      display: grid;
      gap: 12px;
    }

    .action {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 18px;
      text-decoration: none;
      color: #0f172a;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: #f8fafc;
    }

    .action strong {
      display: block;
      font-size: 16px;
    }

    .action span {
      display: block;
      margin-top: 4px;
      color: #64748b;
      font-size: 13px;
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>请从主站进入视频工作台</h1>
    <p>视频站启用了主站登录校验。请先登录主站，再从对应机器人入口进入。当前保留两个独立入口，分别对应 VEO 和 Seedance 2.0。</p>

    <div class="actions">
      <a class="action" href="/bot/video-workbench">
        <div>
          <strong>VEO 视频工作台</strong>
          <span>进入 VEO 模型视频站</span>
        </div>
        <b>进入</b>
      </a>

      <a class="action" href="/bot/video-workbench-seedance">
        <div>
          <strong>Seedance 2.0 视频工作台</strong>
          <span>进入 Seedance 2.0 视频站</span>
        </div>
        <b>进入</b>
      </a>
    </div>

    <p class="note">如果直接打开独立视频站未携带主站登录票据，会被自动带回上面的对应入口。</p>
  </main>
</body>
</html>
